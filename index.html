<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Mallika ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:linear-gradient(#05021b,#090033,#15003d);
color:white;
height:100vh;
width:100vw;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* container */

.container{
width:100%;
max-width:420px;
padding:20px;
}

/* stars */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* card */

.card{
width:100%;
padding:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:25px;
}

/* neon name */

h1{
font-family:'Great Vibes';
font-size:46px;
text-shadow:
0 0 5px #fff,
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff4da6;
}

/* message */

#message{
font-family:'Great Vibes';
font-size:26px;
line-height:38px;
min-height:160px;
}

/* 3D heart */

.heart3d{
font-size:70px;
margin:10px 0;
animation:beat 1s infinite;
filter:drop-shadow(0 0 15px #ff2e63);
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.25)}
100%{transform:scale(1)}
}

/* petals */

.petal{
position:fixed;
top:-10px;
width:12px;
height:12px;
background:radial-gradient(circle,#ff9bb3,#ff4d6d);
border-radius:50%;
opacity:0;
animation:petalFall linear infinite;
}

@keyframes petalFall{

0%{
transform:translateY(-10vh) rotate(0deg);
opacity:0;
}

10%{
opacity:0.8;
}

90%{
opacity:0.8;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

/* floating hearts */

.fheart{
position:fixed;
color:#ff2e63;
font-size:18px;
opacity:0;
animation:heartFloat 7s linear forwards;
}

@keyframes heartFloat{

0%{
transform:translateY(100vh) scale(0.6);
opacity:0;
}

15%{
opacity:1;
}

85%{
opacity:1;
}

100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}

}

/* love animation */

.love-animation{
margin-top:25px;
cursor:pointer;
}

svg{
width:100%;
height:auto;
}

.lttr{
font-family:'Great Vibes';
font-size:60px;
fill:#fff;
stroke:#ff2e63;
stroke-width:2;
opacity:0;
filter:drop-shadow(0 0 10px #ff2e63);
}

.tap{
margin-top:6px;
font-size:13px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Mallika ❤️</h1>

<div class="heart3d">❤️</div>

<div id="message"></div>

<div style="margin-top:8px;">— Vikash 💌</div>

</div>

<div class="love-animation" onclick="playLove()">

<svg viewBox="0 0 900 150">

<text x="50" y="90" class="lttr">I</text>
<text x="120" y="90" class="lttr">L</text>
<text x="170" y="90" class="lttr">O</text>
<text x="230" y="90" class="lttr">V</text>
<text x="290" y="90" class="lttr">E</text>
<text x="360" y="90" class="lttr">Y</text>
<text x="420" y="90" class="lttr">O</text>
<text x="480" y="90" class="lttr">U</text>
<text x="580" y="90" class="lttr">B</text>
<text x="640" y="90" class="lttr">E</text>
<text x="700" y="90" class="lttr">T</text>
<text x="760" y="90" class="lttr">U</text>

</svg>

<div class="tap">Tap here ❤️</div>

</div>

</div>

<script>

/* stars */

for(let i=0;i<70;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDuration=1+Math.random()*3+"s"
document.body.appendChild(s)
}

/* romantic messages */

let messages=[

`

If you are reading this,

it means you found
my little surprise.

And honestly...

I just wanted to remind you
how lucky I feel
to have you.`,

`

Out of millions
of people in this world,

my heart somehow
chose you.

And I would choose you
again and again.`,

`

Your smile
is my favourite thing
in this world.

Whenever you smile,
everything feels
a little more beautiful.`

]

let text=messages[Math.floor(Math.random()*messages.length)]
let i=0

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i)
i++
setTimeout(type,40)
}
}

type()

/* floating hearts */

setInterval(()=>{
let h=document.createElement("div")
h.className="fheart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"vw"
document.body.appendChild(h)
setTimeout(()=>h.remove(),7000)
},900)

/* petals */

setInterval(()=>{
let p=document.createElement("div")
p.className="petal"
p.style.left=Math.random()*100+"vw"
p.style.animationDuration=7+Math.random()*5+"s"
document.body.appendChild(p)
setTimeout(()=>p.remove(),11000)
},900)

/* tap animation */

function playLove(){

confetti({
particleCount:180,
spread:120,
origin:{y:0.7}
})

anime.timeline()

.add({
targets:'.lttr',
opacity:[0,1],
translateY:[40,0],
scale:[0.8,1],
easing:"easeOutExpo",
duration:1200,
delay:(el,i)=>120*i
})

}

</script>

</body>
</html>
