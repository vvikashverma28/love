<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Mallika ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3a0);
background-size:400% 400%;
animation:bgmove 12s infinite alternate;
color:white;
text-align:center;
overflow-x:hidden;
}

/* animated gradient */

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

/* card */

.card{

width:90%;
max-width:420px;

margin:auto;
margin-top:90px;

padding:35px;

background:rgba(255,255,255,0.18);

backdrop-filter:blur(25px);

border-radius:28px;

box-shadow:
0 20px 50px rgba(0,0,0,0.25),
inset 0 0 20px rgba(255,255,255,0.2);

animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* title */

h1{
font-family:'Great Vibes';
font-size:46px;
margin-bottom:10px;
text-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* message */

#message{

font-family:'Great Vibes';

font-size:30px;

line-height:45px;

min-height:220px;

padding:10px;

animation:fadeIn 1s;
}

/* signature */

.signature{

margin-top:15px;

font-size:20px;

opacity:0.9;

}

/* heart */

.heart{

font-size:70px;

margin-top:15px;

animation:beat 1s infinite;
}

@keyframes beat{

0%{transform:scale(1)}
50%{transform:scale(1.25)}
100%{transform:scale(1)}

}

/* floating hearts */

.fheart{

position:fixed;

color:#ff3d6d;

font-size:20px;

animation:float 7s linear infinite;
}

@keyframes float{

0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}

}

/* petals */

.petal{

position:fixed;

top:-10px;

width:12px;
height:12px;

background:rgba(255,192,203,0.9);

border-radius:50%;

animation:fall linear infinite;
}

@keyframes fall{

to{
transform:translateY(110vh) rotate(360deg);
}

}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8cdb0c24fd.mp3">
</audio>

<div class="card">

<h1>Mallika ❤️</h1>

<div class="heart">❤️</div>

<div id="message"></div>

<div class="signature">— Vikash 💌</div>

</div>

<script>

/* romantic messages */

let messages=[

`If you are reading this...

it means

somewhere

someone

misses you

a little too much ❤️`,

`Out of millions of people

my heart somehow

found its way

to you ❤️`,

`Some people

make life beautiful

just by existing

and you are

one of them ❤️`,

`Every time I hear your name

my heart

forgets

how to stay calm ❤️`,

`If happiness had a face

it would look

a little bit

like you ❤️`,

`The world feels

a little softer

when I think

about you ❤️`

]

/* choose random message */

let text=messages[Math.floor(Math.random()*messages.length)]

let i=0

function type(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i)

i++

setTimeout(type,40)

}

else{

confetti({

particleCount:150,

spread:110,

origin:{y:0.6}

})

}

}

type()

/* floating hearts */

setInterval(()=>{

let h=document.createElement("div")

h.className="fheart"

h.innerHTML="❤️"

h.style.left=Math.random()*100+"%"

document.body.appendChild(h)

setTimeout(()=>h.remove(),7000)

},700)

/* petals */

setInterval(()=>{

let p=document.createElement("div")

p.className="petal"

p.style.left=Math.random()*100+"%"

p.style.animationDuration=5+Math.random()*5+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),10000)

},500)

</script>

</body>
</html>
