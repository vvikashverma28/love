<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Mallika ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(#05021b,#090033,#15003d);
color:white;
text-align:center;
overflow-x:hidden;
}

/* stars */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

/* card */

.card{
width:90%;
max-width:420px;
margin:auto;
margin-top:70px;
padding:30px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:25px;
}

/* neon name */

h1{
font-family:'Great Vibes';
font-size:50px;
text-shadow:
0 0 5px #fff,
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff4da6;
}

/* message */

#message{
font-family:'Great Vibes';
font-size:28px;
min-height:180px;
line-height:40px;
}

/* 3D heart */

.heart3d{
font-size:80px;
margin:10px 0;
animation:beat 1s infinite;
filter:drop-shadow(0 0 15px #ff2e63);
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.25)}
100%{transform:scale(1)}
}

/* petals */

.petal{
position:fixed;
top:-10px;
width:14px;
height:14px;
background:radial-gradient(circle,#ff9bb3,#ff4d6d);
border-radius:50%;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* floating hearts */

.fheart{
position:fixed;
color:#ff2e63;
font-size:20px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* love animation */

.love-animation{
margin-top:100px;
cursor:pointer;
}

.lttr{
font-family:'Great Vibes';
font-size:65px;
fill:#fff;
stroke:#ff2e63;
stroke-width:2;
opacity:0;
filter:drop-shadow(0 0 10px #ff2e63);
}

.tap{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="card">

<h1>Mallika</h1>

<div class="heart3d">❤️</div>

<div id="message"></div>

<div style="margin-top:10px;">— Vikash 💌</div>

</div>

<div class="love-animation" onclick="playLove()">

<svg viewBox="0 0 900 150">

<text x="50" y="90" class="lttr">I</text>
<text x="120" y="90" class="lttr">L</text>
<text x="170" y="90" class="lttr">O</text>
<text x="230" y="90" class="lttr">V</text>
<text x="290" y="90" class="lttr">E</text>
<text x="360" y="90" class="lttr">Y</text>
<text x="420" y="90" class="lttr">O</text>
<text x="480" y="90" class="lttr">U</text>
<text x="580" y="90" class="lttr">B</text>
<text x="640" y="90" class="lttr">E</text>
<text x="700" y="90" class="lttr">T</text>
<text x="760" y="90" class="lttr">U</text>

</svg>

<div class="tap">Tap here ❤️</div>

</div>

<script>

/* stars */

for(let i=0;i<80;i++){
let s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"%"
s.style.top=Math.random()*100+"%"
s.style.animationDuration=1+Math.random()*3+"s"
document.body.appendChild(s)
}

/* romantic messages */

let messages=[

`
If you are reading this,

it means you found
my little surprise.

And honestly,

I just wanted to remind you
how lucky I feel
to have you.`,

`

Out of millions
of people in this world,

my heart somehow
chose you.

And I would choose you
again and again.`,

`
Your smile
is my favourite thing
in this world.

Whenever you smile,
everything feels
a little more beautiful.`,

`
No matter how busy
life gets,

one thing will
always stay the same...

I will always
care about you.`,

`
I don't just love you
because you're beautiful.

I love you because
you make my life
feel special.`

]

let text=messages[Math.floor(Math.random()*messages.length)]
let i=0

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i)
i++
setTimeout(type,40)
}
}

type()

/* floating hearts */

setInterval(()=>{
let h=document.createElement("div")
h.className="fheart"
h.innerHTML="❤️"
h.style.left=Math.random()*100+"%"
document.body.appendChild(h)
setTimeout(()=>h.remove(),7000)
},700)

/* petals */

setInterval(()=>{
let p=document.createElement("div")
p.className="petal"
p.style.left=Math.random()*100+"%"
p.style.animationDuration=5+Math.random()*5+"s"
document.body.appendChild(p)
setTimeout(()=>p.remove(),10000)
},500)

/* tap animation */

function playLove(){

confetti({
particleCount:200,
spread:120,
origin:{y:0.7}
})

anime.timeline()

.add({
targets:'.lttr',
opacity:[0,1],
translateY:[40,0],
scale:[0.8,1],
easing:"easeOutExpo",
duration:1200,
delay:(el,i)=>120*i
})

}

</script>

</body>
</html>
